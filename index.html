<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shunkaen Bonsai Garden | 春花園</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Noto Serif JP"', 'serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- lucide-react icons via CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { margin: 0; padding: 0; }
    @keyframes bounce {
      0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
      50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); }
    }
    .animate-bounce { animation: bounce 1s infinite; }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Lucide icons wrapped as React components
    const Icon = ({ name, size = 24, color, className = '' }) => {
      const ref = React.useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const svgStr = lucide.createElement(lucide[name.replace(/-([a-z])/g, (_, c) => c.toUpperCase())]);
          if (svgStr) {
            svgStr.setAttribute('width', size);
            svgStr.setAttribute('height', size);
            if (color) svgStr.setAttribute('stroke', color);
            svgStr.setAttribute('class', className);
            ref.current.appendChild(svgStr);
          }
        }
      }, [name, size, color, className]);
      return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center' }}></span>;
    };

    function App() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 50);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const colors = {
        bgDark: '#0a0a0a',
        bgGreen: '#121a14',
        gold: '#c8a97e',
        textLight: '#e5e5e5',
        textMuted: '#9ca3af'
      };

      return (
        <div className="min-h-screen font-serif" style={{ backgroundColor: colors.bgDark, color: colors.textLight }}>

          {/* Navigation */}
          <nav
            className={`fixed w-full z-50 transition-all duration-500 border-b border-white/5 ${isScrolled ? 'py-4 backdrop-blur-md' : 'py-6 bg-transparent'}`}
            style={{ backgroundColor: isScrolled ? 'rgba(10,10,10,0.9)' : 'transparent' }}
          >
            <div className="container mx-auto px-6 md:px-12 flex justify-between items-center">
              <div className="flex flex-col">
                <span className="text-2xl tracking-[0.2em] uppercase font-light" style={{ color: colors.gold }}>Shunkaen</span>
                <span className="text-xs tracking-[0.3em] text-gray-400 mt-1">Bonsai Garden</span>
              </div>

              {/* Desktop Menu */}
              <div className="hidden md:flex items-center space-x-10 text-sm tracking-widest uppercase">
                <a href="#concept" className="hover:text-[#c8a97e] transition-colors" style={{ color: colors.textLight }}>Concept</a>
                <a href="#experiences" className="hover:text-[#c8a97e] transition-colors" style={{ color: colors.textLight }}>Experiences</a>
                <a href="#garden" className="hover:text-[#c8a97e] transition-colors" style={{ color: colors.textLight }}>Garden & Master</a>
                <a href="#visit" className="hover:text-[#c8a97e] transition-colors" style={{ color: colors.textLight }}>Visit</a>
                <button
                  className="px-6 py-3 border transition-colors duration-300 hover:bg-[#c8a97e] hover:text-black hover:border-[#c8a97e]"
                  style={{ borderColor: colors.gold, color: colors.gold }}
                >
                  Book Now
                </button>
              </div>

              {/* Mobile Menu Toggle */}
              <button className="md:hidden" style={{ color: colors.textLight }} onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                {mobileMenuOpen
                  ? <Icon name="x" size={28} color={colors.textLight} />
                  : <Icon name="menu" size={28} color={colors.textLight} />
                }
              </button>
            </div>

            {/* Mobile Menu */}
            {mobileMenuOpen && (
              <div className="md:hidden absolute top-full left-0 w-full bg-[#0a0a0a] border-t border-white/10 py-6 px-6 flex flex-col space-y-6">
                <a href="#concept" className="text-lg tracking-widest uppercase" style={{ color: colors.textLight }} onClick={() => setMobileMenuOpen(false)}>Concept</a>
                <a href="#experiences" className="text-lg tracking-widest uppercase" style={{ color: colors.textLight }} onClick={() => setMobileMenuOpen(false)}>Experiences</a>
                <a href="#garden" className="text-lg tracking-widest uppercase" style={{ color: colors.textLight }} onClick={() => setMobileMenuOpen(false)}>Garden & Master</a>
                <a href="#visit" className="text-lg tracking-widest uppercase" style={{ color: colors.textLight }} onClick={() => setMobileMenuOpen(false)}>Visit</a>
                <button className="w-full py-4 border mt-4 text-center tracking-widest uppercase" style={{ borderColor: colors.gold, color: colors.gold }}>
                  Book Now
                </button>
              </div>
            )}
          </nav>

          {/* Hero Section */}
          <section className="relative h-screen flex items-center justify-center overflow-hidden">
            <div className="absolute inset-0 z-0">
              <img
                src="https://images.unsplash.com/photo-1613143525283-6f1ce9b6fa72?auto=format&fit=crop&q=80&w=2000"
                alt="Bonsai Garden"
                className="w-full h-full object-cover opacity-60"
                style={{ transform: 'scale(1.05)', transformOrigin: 'center' }}
              />
              <div className="absolute inset-0 bg-gradient-to-b from-black/60 via-black/30 to-[#0a0a0a]"></div>
            </div>

            <div className="relative z-10 flex flex-col md:flex-row items-center justify-center h-full pt-20">
              {/* Vertical Japanese Text (Left) */}
              <div className="hidden md:flex flex-row-reverse space-x-8 mr-16" style={{ writingMode: 'vertical-rl', gap: '2rem' }}>
                <h1 className="text-5xl md:text-6xl tracking-[0.3em] font-light text-white" style={{ textShadow: '0 2px 8px rgba(0,0,0,0.5)' }}>静寂と躍動</h1>
                <h2 className="text-3xl md:text-4xl tracking-[0.4em] font-light mt-12" style={{ color: colors.gold }}>命の尊厳</h2>
              </div>

              {/* Mobile Text */}
              <div className="md:hidden text-center mb-12" style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                <h1 className="text-4xl tracking-[0.3em] font-light text-white">静寂と躍動</h1>
                <h2 className="text-2xl tracking-[0.4em] font-light" style={{ color: colors.gold }}>命の尊厳</h2>
              </div>

              {/* Vertical Line Separator (Desktop) */}
              <div className="hidden md:block w-px h-64 opacity-50 mx-8" style={{ background: 'linear-gradient(to bottom, transparent, #c8a97e, transparent)' }}></div>

              {/* English Concept (Right) */}
              <div className="text-center md:text-left mt-8 md:mt-0 px-6">
                <p className="text-sm md:text-base tracking-[0.3em] uppercase mb-4" style={{ color: colors.gold }}>Bonsai Garden & Cultural Experience</p>
                <p className="text-2xl md:text-4xl font-light leading-relaxed tracking-wider">
                  Breathe.<br />
                  Feel the life within.<br />
                  Master the art of patience.
                </p>
              </div>
            </div>

            {/* Scroll Indicator */}
            <div className="absolute bottom-10 left-1/2 transform -translate-x-1/2 flex flex-col items-center animate-bounce opacity-50">
              <span className="text-xs tracking-widest uppercase mb-2" style={{ color: colors.gold }}>Scroll</span>
              <div className="w-px h-12 bg-[#c8a97e]"></div>
            </div>
          </section>

          {/* Concept Section */}
          <section id="concept" className="py-32 px-6 md:px-12 relative" style={{ backgroundColor: colors.bgGreen }}>
            <div className="container mx-auto max-w-5xl">
              <div className="flex flex-col md:flex-row gap-16 items-center">
                <div className="md:w-1/2" style={{ writingMode: 'vertical-rl' }}>
                  <h3 className="text-3xl md:text-4xl tracking-[0.3em] font-light leading-loose" style={{ height: '400px' }}>
                    単に<span style={{ color: colors.gold }}>見る</span>だけではない。<br/>
                    自らの手で触れ、<br/>
                    五感で味わう<br/>
                    生きた日本文化体験。
                  </h3>
                </div>
                <div className="md:w-1/2" style={{ display: 'flex', flexDirection: 'column', gap: '2rem' }}>
                  <p className="text-lg leading-loose font-light text-gray-300">
                    春花園は、完成された盆栽をガラス越しに眺めるだけの場所ではありません。ここは、土の匂いを感じ、枝葉の息遣いを聞き、自らの手で「命」と向き合うための庭園です。
                  </p>
                  <p className="text-lg leading-loose font-light text-gray-300">
                    Shunkaen is not merely a museum to view completed bonsai behind glass. It is a living garden where you smell the soil, hear the breath of the branches, and face "life" with your own hands.
                  </p>
                  <div className="pt-8 border-t border-white/10">
                    <p className="tracking-widest uppercase text-sm" style={{ color: colors.gold }}>Experience the Dignity of Life</p>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Experiences Section */}
          <section id="experiences" className="py-32 px-6 md:px-12" style={{ backgroundColor: colors.bgDark }}>
            <div className="container mx-auto max-w-7xl">
              <div className="text-center mb-20 flex flex-col items-center">
                <h2 className="text-3xl md:text-5xl tracking-[0.2em] font-light uppercase mb-6" style={{ color: colors.gold }}>Experiences</h2>
                <div className="w-12 h-px bg-[#c8a97e] mb-6"></div>
                <p className="text-gray-400 tracking-widest uppercase text-sm">庭園で味わう、極上のひととき</p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-24">

                {/* Experience 1: Bonsai */}
                <div className="group cursor-pointer">
                  <div className="relative overflow-hidden mb-8" style={{ aspectRatio: '3/4' }}>
                    <img
                      src="https://images.unsplash.com/photo-1599598425947-3300262b7ae1?auto=format&fit=crop&q=80&w=800"
                      alt="Bonsai Experience"
                      className="w-full h-full object-cover"
                      style={{ filter: 'grayscale(100%)', opacity: '0.8', transition: 'all 0.7s', }}
                      onMouseOver={e => { e.currentTarget.style.filter = 'grayscale(0%)'; e.currentTarget.style.transform = 'scale(1.05)'; }}
                      onMouseOut={e => { e.currentTarget.style.filter = 'grayscale(100%)'; e.currentTarget.style.transform = 'scale(1)'; }}
                    />
                    <div className="absolute inset-0 border border-white/10 m-4 pointer-events-none" style={{ transition: 'border-color 0.5s' }}></div>
                  </div>
                  <div className="flex items-center mb-4" style={{ gap: '1rem' }}>
                    <Icon name="scissors" size={20} color={colors.gold} />
                    <h3 className="text-2xl tracking-widest font-light">盆栽体験</h3>
                    <span className="text-sm text-gray-500 tracking-widest uppercase">Bonsai</span>
                  </div>
                  <p className="text-gray-400 font-light leading-relaxed mb-6">
                    木を選び、土に触れ、剪定する。職人の指導のもと、一連のプロセスをストーリー仕立てで体験します。初心者・手ぶらでの参加も歓迎。
                  </p>
                  <div className="flex items-center text-sm tracking-widest uppercase" style={{ color: colors.gold }}>
                    <span>View Details</span>
                    <Icon name="chevron-right" size={16} color={colors.gold} />
                  </div>
                </div>

                {/* Sub Experiences Grid */}
                <div className="flex flex-col justify-between" style={{ gap: '3rem' }}>
                  <div className="mt-8 md:mt-24 mb-8">
                    <h3 className="text-2xl tracking-widest font-light mb-4" style={{ color: colors.gold }}>Traditional Culture</h3>
                    <p className="text-gray-400 font-light leading-relaxed">盆栽庭園という極上の空間で、日本の伝統文化に深く没入するプログラム。</p>
                  </div>

                  {/* Experience 2: Tea */}
                  <div className="cursor-pointer flex items-center pb-8 border-b border-white/10" style={{ gap: '2rem' }}>
                    <div className="overflow-hidden relative" style={{ width: '33%', aspectRatio: '1/1' }}>
                      <img src="https://images.unsplash.com/photo-1545041042-45e0d49b292e?auto=format&fit=crop&q=80&w=400" alt="Tea Ceremony"
                        className="w-full h-full object-cover"
                        style={{ filter: 'grayscale(100%)', opacity: '0.8', transition: 'all 0.7s' }}
                        onMouseOver={e => { e.currentTarget.style.filter = 'grayscale(0%)'; e.currentTarget.style.transform = 'scale(1.1)'; }}
                        onMouseOut={e => { e.currentTarget.style.filter = 'grayscale(100%)'; e.currentTarget.style.transform = 'scale(1)'; }}
                      />
                    </div>
                    <div style={{ width: '67%' }}>
                      <div className="flex items-center mb-2" style={{ gap: '0.75rem' }}>
                        <Icon name="coffee" size={16} color={colors.gold} />
                        <h4 className="text-xl tracking-widest font-light">茶道</h4>
                      </div>
                      <p className="text-sm text-gray-500 uppercase tracking-widest mb-3">Tea Ceremony</p>
                      <p className="text-sm text-gray-400 font-light line-clamp-2">静寂な茶室で、抹茶と季節の和菓子を味わう。盆栽を鑑賞した後の至福のひととき。</p>
                    </div>
                  </div>

                  {/* Experience 3: Kimono */}
                  <div className="cursor-pointer flex items-center pb-8 border-b border-white/10" style={{ gap: '2rem' }}>
                    <div className="overflow-hidden relative" style={{ width: '33%', aspectRatio: '1/1' }}>
                      <img src="https://images.unsplash.com/photo-1578330725556-324391e6b36a?auto=format&fit=crop&q=80&w=400" alt="Kimono"
                        className="w-full h-full object-cover"
                        style={{ filter: 'grayscale(100%)', opacity: '0.8', transition: 'all 0.7s' }}
                        onMouseOver={e => { e.currentTarget.style.filter = 'grayscale(0%)'; e.currentTarget.style.transform = 'scale(1.1)'; }}
                        onMouseOut={e => { e.currentTarget.style.filter = 'grayscale(100%)'; e.currentTarget.style.transform = 'scale(1)'; }}
                      />
                    </div>
                    <div style={{ width: '67%' }}>
                      <div className="flex items-center mb-2" style={{ gap: '0.75rem' }}>
                        <Icon name="sparkles" size={16} color={colors.gold} />
                        <h4 className="text-xl tracking-widests font-light">着物</h4>
                      </div>
                      <p className="text-sm text-gray-500 uppercase tracking-widest mb-3">Kimono Dress-up</p>
                      <p className="text-sm text-gray-400 font-light line-clamp-2">伝統的な着物に身を包み、緑豊かな庭園を散策。最高の記念撮影を。</p>
                    </div>
                  </div>

                  {/* Experience 4: Calligraphy */}
                  <div className="cursor-pointer flex items-center" style={{ gap: '2rem' }}>
                    <div className="overflow-hidden relative" style={{ width: '33%', aspectRatio: '1/1' }}>
                      <img src="https://images.unsplash.com/photo-1580211516089-a31eb282e7bb?auto=format&fit=crop&q=80&w=400" alt="Calligraphy"
                        className="w-full h-full object-cover"
                        style={{ filter: 'grayscale(100%)', opacity: '0.8', transition: 'all 0.7s' }}
                        onMouseOver={e => { e.currentTarget.style.filter = 'grayscale(0%)'; e.currentTarget.style.transform = 'scale(1.1)'; }}
                        onMouseOut={e => { e.currentTarget.style.filter = 'grayscale(100%)'; e.currentTarget.style.transform = 'scale(1)'; }}
                      />
                    </div>
                    <div style={{ width: '67%' }}>
                      <div className="flex items-center mb-2" style={{ gap: '0.75rem' }}>
                        <Icon name="pen-tool" size={16} color={colors.gold} />
                        <h4 className="text-xl tracking-widest font-light">書道</h4>
                      </div>
                      <p className="text-sm text-gray-500 uppercase tracking-widest mb-3">Calligraphy</p>
                      <p className="text-sm text-gray-400 font-light line-clamp-2">墨の香りに包まれながら、心を静めて筆を走らせる精神統一の体験。</p>
                    </div>
                  </div>

                </div>
              </div>
            </div>
          </section>

          {/* Garden & Master Section */}
          <section id="garden" className="py-32 px-6 md:px-12 relative" style={{ backgroundColor: '#0f120f', borderTop: '1px solid rgba(200,169,126,0.2)', borderBottom: '1px solid rgba(200,169,126,0.2)' }}>
            <div className="container mx-auto max-w-6xl">
              <div className="flex flex-col lg:flex-row gap-16 items-center">
                <div className="lg:w-1/2" style={{ order: 2 }}>
                  <h2 className="text-3xl md:text-4xl tracking-[0.2em] font-light mb-2" style={{ color: colors.gold }}>The Garden & Master</h2>
                  <h3 className="text-xl tracking-widest text-gray-500 mb-8 font-light">庭園と小林國雄</h3>

                  <p className="text-lg leading-loose font-light text-gray-300 mb-6">
                    1,000鉢を超える名品が四季折々の表情を見せる盆栽庭園。その主である小林國雄は、内閣総理大臣賞を4度受賞するなど、世界的に知られる盆栽界の巨匠です。
                  </p>
                  <p className="text-lg leading-loose font-light text-gray-400 mb-10">
                    "Bonsai is an art without end. It teaches us the beauty of life, the inevitability of death, and the harmony of nature."
                  </p>

                  <button className="flex items-center pb-2 border-b transition-colors hover:text-white" style={{ borderColor: colors.gold, color: colors.gold, gap: '1rem' }}>
                    <span className="tracking-widest uppercase text-sm">Read the Full Story</span>
                    <Icon name="chevron-right" size={16} color={colors.gold} />
                  </button>
                </div>

                <div className="lg:w-1/2 w-full" style={{ order: 1 }}>
                  <div className="relative w-full max-w-md mx-auto lg:ml-auto" style={{ aspectRatio: '4/5' }}>
                    <img
                      src="https://images.unsplash.com/photo-1555505019-8c3f1c4aba5f?auto=format&fit=crop&q=80&w=800"
                      alt="Master Craftsman"
                      className="w-full h-full object-cover"
                      style={{ filter: 'sepia(30%) grayscale(50%)' }}
                    />
                    <div className="absolute hidden md:block" style={{ bottom: '-2rem', left: '-2rem', width: '12rem', height: '12rem', border: `1px solid ${colors.gold}` }}></div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* CTA / Booking Banner */}
          <section className="py-24 px-6 relative overflow-hidden" style={{ backgroundColor: colors.bgDark }}>
            <div className="absolute inset-0 opacity-10" style={{ background: 'radial-gradient(circle at center, #c8a97e, transparent)' }}></div>
            <div className="container mx-auto max-w-3xl text-center relative z-10">
              <h2 className="text-3xl md:text-5xl tracking-[0.2em] font-light mb-8">五感を開く、千夜の緑へ。</h2>
              <p className="text-gray-400 font-light mb-12 tracking-widest leading-relaxed">
                盆栽、着物、茶道。<br/>
                あなただけの1日パッケージプランをご用意しております。
              </p>
              <button
                className="px-12 py-5 text-black tracking-widest uppercase font-medium transition-all duration-300 hover:bg-white"
                style={{ backgroundColor: colors.gold }}
              >
                Book Your Experience
              </button>
            </div>
          </section>

          {/* Footer */}
          <footer id="visit" className="pt-20 pb-10 px-6 md:px-12 border-t border-white/5" style={{ backgroundColor: '#050505' }}>
            <div className="container mx-auto max-w-7xl">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-12 mb-16">
                <div>
                  <div className="flex flex-col mb-6">
                    <span className="text-2xl tracking-[0.2em] uppercase font-light" style={{ color: colors.gold }}>Shunkaen</span>
                    <span className="text-xs tracking-[0.3em] text-gray-500 mt-1">Bonsai Garden</span>
                  </div>
                  <p className="text-gray-400 font-light leading-relaxed text-sm">
                    A living garden where you can experience<br/>the true essence of Japanese traditional culture.
                  </p>
                </div>

                <div>
                  <h4 className="tracking-widest uppercase mb-6" style={{ color: colors.gold }}>Visit Us</h4>
                  <div className="text-sm text-gray-400 font-light" style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                    <p className="flex items-start" style={{ gap: '0.75rem' }}>
                      <Icon name="map-pin" size={16} color={colors.textMuted} />
                      <span>〒132-0001<br/>東京都江戸川区新堀1-29-16<br/>1-29-16 Niihori, Edogawa-ku, Tokyo</span>
                    </p>
                    <p>Open: 10:00 - 17:00</p>
                    <p>Closed: Monday (Except National Holidays)</p>
                  </div>
                </div>

                <div>
                  <h4 className="tracking-widest uppercase mb-6" style={{ color: colors.gold }}>Connect</h4>
                  <div className="text-sm font-light" style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                    <a href="#" className="text-gray-400 hover:text-[#c8a97e] transition-colors block">Instagram</a>
                    <a href="#" className="text-gray-400 hover:text-[#c8a97e] transition-colors block">Facebook</a>
                    <a href="#" className="text-gray-400 hover:text-[#c8a97e] transition-colors block">Contact Us</a>
                  </div>
                </div>
              </div>

              <div className="text-center pt-8 border-t border-white/10 text-xs text-gray-600 tracking-widest">
                &copy; {new Date().getFullYear()} Shunkaen Bonsai Garden. All rights reserved.
              </div>
            </div>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
